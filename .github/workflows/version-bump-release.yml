name: Manual Release Preparation

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Release type (major, minor, patch) OR explicit version (e.g., 1.2.1)'
        required: true
        default: 'patch'
      release_summary:
        description: 'Optional summary for the changelog and release notes'
        required: false
        default: 'Internal maintenance and synchronization.'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for git log and tagging
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Verify Repository Health
        run: npm run typecheck

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Bump Version
        run: npm run version:bump -- ${{ github.event.inputs.bump_type }}

      - name: Generate Release Notes
        run: npm run release:notes

      - name: Update Changelog
        run: |
          # Use the summary input if provided
          SUMMARY="${{ github.event.inputs.release_summary }}"
          npm run changelog:update -- "" "$SUMMARY"

      - name: Commit Release Metadata
        run: |
          # Pull the new version from the root package.json for the commit message
          NEW_VERSION=$(node -p "require('./package.json').version")
          
          git add package.json VERSION CHANGELOG.md RELEASE_NOTES_*.md
          # Also add any package.json in apps/ or packages/ that was changed
          git add "**/package.json"
          
          git commit -m "chore(release): v$NEW_VERSION"
          git push origin HEAD:${{ github.ref }}

      - name: Create and Push Tag
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v$NEW_VERSION"
          
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v$NEW_VERSION"
          NOTES_FILE="RELEASE_NOTES_v$NEW_VERSION.md"
          
          gh release create "$TAG" \
            --title "Code Kit Ultra $TAG" \
            --notes-file "$NOTES_FILE" \
            --verify-tag
