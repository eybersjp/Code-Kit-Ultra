name: Release Milestone

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic Version Tag (e.g., v1.2.0)'
        required: true
        default: 'v1.2.0'
      milestone_title:
        description: 'Short title for the milestone'
        required: true
        default: 'Phase 10 Production Integration'

jobs:
  verify:
    name: Verification Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: true

      - name: Full Typecheck
        run: pnpm run typecheck

      - name: Run Core Tests
        run: pnpm run test:auth

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Release Tag
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.inputs.version }}
          release_name: "${{ github.event.inputs.version }}: ${{ github.event.inputs.milestone_title }}"
          body: |
            ## Milestone: ${{ github.event.inputs.milestone_title }}
            Integrated automations and baseline for Code Kit Ultra.
          draft: false
          prerelease: false
