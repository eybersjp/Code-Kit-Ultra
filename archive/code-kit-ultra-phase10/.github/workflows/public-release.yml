name: Public Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run build:public-release
      - run: npm run checksums

      - name: Generate Milestone Dashboard
        run: npm run release:dashboard
        env:
          MILESTONE_NAME: "Public Release"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.zip
          body_path: releases/milestones/${{ steps.date.outputs.date }}-${{ steps.version.outputs.version }}.md # Note: this requires some dynamic versioning step
          # For now, just generate the dashboard and upload artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}