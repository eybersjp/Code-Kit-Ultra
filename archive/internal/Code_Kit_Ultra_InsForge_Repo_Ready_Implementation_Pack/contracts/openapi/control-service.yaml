openapi: 3.1.0
info:
  title: Code Kit Ultra Control Service API
  version: 1.0.0
servers:
  - url: https://api.codekit.local
security:
  - bearerAuth: []
paths:
  /v1/session:
    get:
      summary: Resolve current authenticated session
      responses:
        "200":
          description: Authenticated session context
  /v1/runs:
    get:
      summary: List runs
      parameters:
        - in: query
          name: projectId
          schema: { type: string }
      responses:
        "200":
          description: Run list
    post:
      summary: Create a run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRunRequest'
      responses:
        "201":
          description: Run created
  /v1/runs/{runId}:
    get:
      summary: Get run detail
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        "200":
          description: Run detail
  /v1/runs/{runId}/resume:
    post:
      summary: Resume a paused run
      parameters:
        - $ref: '#/components/parameters/RunId'
      requestBody:
        required: false
      responses:
        "202":
          description: Resume accepted
  /v1/runs/{runId}/rollback:
    post:
      summary: Roll back a run
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        "202":
          description: Rollback accepted
  /v1/gates:
    get:
      summary: List pending gates
      parameters:
        - in: query
          name: projectId
          schema: { type: string }
      responses:
        "200":
          description: Gate list
  /v1/gates/{gateId}/approve:
    post:
      summary: Approve a gate
      parameters:
        - $ref: '#/components/parameters/GateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GateDecisionRequest'
      responses:
        "200":
          description: Gate approved
  /v1/gates/{gateId}/reject:
    post:
      summary: Reject a gate
      parameters:
        - $ref: '#/components/parameters/GateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GateDecisionRequest'
      responses:
        "200":
          description: Gate rejected
  /v1/runs/{runId}/events:
    get:
      summary: Get run event timeline
      parameters:
        - $ref: '#/components/parameters/RunId'
      responses:
        "200":
          description: Event timeline
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    RunId:
      in: path
      name: runId
      required: true
      schema:
        type: string
    GateId:
      in: path
      name: gateId
      required: true
      schema:
        type: string
  schemas:
    CreateRunRequest:
      type: object
      required: [projectId, idea, mode]
      properties:
        projectId:
          type: string
        idea:
          type: string
        mode:
          type: string
          enum: [safe, balanced, god]
        metadata:
          type: object
          additionalProperties: true
    GateDecisionRequest:
      type: object
      required: [actionToken]
      properties:
        actionToken:
          type: string
        reason:
          type: string
