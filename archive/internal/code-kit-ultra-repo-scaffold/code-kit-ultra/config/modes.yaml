default_mode: balanced
modes:
  safe:
    description: beginner-friendly, approval-heavy
    clarification_questions: high
    gate_policy: stop-most
  balanced:
    description: practical default with major checkpoints
    clarification_questions: medium
    gate_policy: stop-major
  god:
    description: maximum autonomy with minimal interruption
    clarification_questions: low
    gate_policy: continue-unless-critical
