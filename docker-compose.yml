version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cku
      POSTGRES_USER: cku
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cku"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cku-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  control-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cku-control-service
    restart: unless-stopped
    ports:
      - "7474:7474"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 7474
      DATABASE_URL: postgresql://cku:dev@postgres:5432/cku
      REDIS_URL: redis://redis:6379
      CKU_SERVICE_ACCOUNT_SECRET: ${CKU_SERVICE_ACCOUNT_SECRET:?required}
      CKU_LEGACY_API_KEYS_ENABLED: "false"
      CKU_ALLOWED_ORIGINS: ${CKU_ALLOWED_ORIGINS:-http://localhost:7473}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

volumes:
  pg_data:
  redis_data:
